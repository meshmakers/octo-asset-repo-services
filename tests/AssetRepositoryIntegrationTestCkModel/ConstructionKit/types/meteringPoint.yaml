$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
- typeId: MeteringPoint
  derivedFromCkTypeId: ${this}/Asset
  indexes:
    - indexType: "Ascending"
      fields:
        - attributePaths:
            - MeteringPointNumber
  attributes:
  - id: ${this}/MeteringPointNumber
    name: MeteringPointNumber
  - id: ${this}/MeterReading
    name: MeterReading
  - id: ${this}/OperatingStatus
    name: OperatingStatus
  - id: ${this}/NetworkOperator
    name: NetworkOperator
    isOptional: true
  # Non-optional attribute with default value - for testing AB#3306
  - id: ${this}/SyncSequenceNumber
    name: SyncSequenceNumber
  # Stream data attributes for integration testing
  - id: ${this}/Voltage
    name: Voltage
    isOptional: true
  - id: ${this}/Current
    name: Current
    isOptional: true