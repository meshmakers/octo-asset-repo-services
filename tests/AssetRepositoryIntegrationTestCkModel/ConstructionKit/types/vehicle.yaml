$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
types:
# Abstract base type for vehicles
- typeId: Vehicle
  derivedFromCkTypeId: ${System}/Entity
  isAbstract: true
  attributes:
    - id: ${System}/Name
      name: Name
    - id: ${System}/Description
      name: Description
    - id: ${this}/LicensePlate
      name: LicensePlate
    - id: ${this}/Year
      name: Year
  associations:
    - id: ${this}/VehicleOwnership
      targetCkTypeId: ${this}/Customer

# Concrete derived type: Car
- typeId: Car
  derivedFromCkTypeId: ${this}/Vehicle
  attributes:
    - id: ${this}/NumberOfDoors
      name: NumberOfDoors

# Concrete derived type: Truck
- typeId: Truck
  derivedFromCkTypeId: ${this}/Vehicle
  attributes:
    - id: ${this}/LoadCapacity
      name: LoadCapacity
