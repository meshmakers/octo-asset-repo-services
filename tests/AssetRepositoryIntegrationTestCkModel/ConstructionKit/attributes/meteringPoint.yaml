$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
attributes:
  - id: MeteringPointNumber
    valueType: String
  - id: MeterReading
    valueType: Int
  - id: OperatingStatus
    valueCkEnumId: ${this}/OperatingStatus
    valueType: Enum
  - id: NetworkOperator
    valueCkEnumId: ${this}/NetworkOperator
    valueType: Enum
  # Attribute with default value for testing non-null GraphQL field resolution
  # This attribute is NOT optional but has a default value - simulating the LastSyncedSequenceNumber scenario
  - id: SyncSequenceNumber
    valueType: Int
    description: Sync sequence number for testing default value handling
    defaultValues:
      - 0
  # Stream data attributes for integration testing stream data queries
  - id: Voltage
    valueType: Double
    isDataStream: true
  - id: Current
    valueType: Double
    isDataStream: true