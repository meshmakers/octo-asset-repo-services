# Root-level CI pipeline using shared templates from octo-pipeline-templates.
#
# Coexists with devops-build/azure-pipelines.yml during the Phase 1-services
# pilot. Once parity is verified (BuildNumber, OctoVersion, Docker tags,
# test result), def 93 yamlFilename can be flipped to this file and
# devops-build/ deleted in a follow-up commit. Services-train references
# def 93 by ID so the train is unaffected by the yamlFilename swap.
#
# Asset-repo-specific quirks preserved from the legacy YAML:
#   - InstallSSHKey + submodules:recursive — Octo.User.props from private submodule
#   - download-ca — internal CA for dotnet restore
#   - NO separate Build step (Test does the implicit build, matches legacy)
#   - NO push-nuget — service doesn't publish NuGets
#   - NO CK library output — no ConstructionKit project in this repo
#   - NO SystemTests exclusion (uses bare **/*Tests.csproj — matches legacy)

name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

parameters:
  # Injected by the release train on r-tag builds so the whole chain pins the
  # scheduler-determined lib/comm release version (forwarded to
  # update-build-number.yml). Default 'auto' = no override (version computed
  # normally); the train injects the real version on r-tag.
  - name: octoCoreLibVersion
    type: string
    default: 'auto'
  - name: octoCommVersion
    type: string
    default: 'auto'

resources:
  repositories:
    - repository: pipelineTemplates
      type: github
      name: meshmakers/octo-pipeline-templates
      endpoint: meshmakers-access-token
      ref: refs/tags/tpl-v0.4.11

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'

variables:
  - group: GitSSHGroup
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.AssetRepServices.sln'
  - name: artifactsFrameworkVersion
    value: 'net10.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

stages:
  - stage: Build
    jobs:
      - job: linux
        displayName: 'Build, test, and push Docker image'
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: templates/steps/update-build-number.yml@pipelineTemplates
            parameters:
              octoCoreLibVersionOverride: ${{ replace(parameters.octoCoreLibVersion, 'auto', '') }}
              octoCommVersionOverride: ${{ replace(parameters.octoCommVersion, 'auto', '') }}
          - checkout: self
            clean: true
            submodules: recursive
          - task: InstallSSHKey@0
            displayName: 'Install SSH key for private submodules'
            inputs:
              knownHostsEntry: '$(SSHKnownHosts)'
              sshPublicKey: '$(SSHPublicKey)'
              sshPassphrase: '$(SSHPassphrase)'
              sshKeySecureFile: '$(SSHPrivateKeyFile)'
          - template: templates/steps/set-version.yml@pipelineTemplates
          - template: templates/steps/download-ca.yml@pipelineTemplates
          - task: DotNetCoreCLI@2
            retryCountOnTaskFailure: 2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(solutionFile)'
              restoreArguments: '--force /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              noCache: true
          - task: DotNetCoreCLI@2
            retryCountOnTaskFailure: 2
            displayName: 'Test'
            inputs:
              command: 'test'
              arguments: '--configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              projects: |
                **/*Tests.csproj
              testRunTitle: 'CI'
          # Multi-arch image (AB#4451): arm64 for Apple-Silicon kind clusters and
          # edge devices, amd64 for the managed clusters.
          - template: templates/steps/build-and-push-docker.yml@pipelineTemplates
            parameters:
              publicRegistryServiceConnection: $(DockerRegistryPublicConnection)
              privateRegistryName: $(DockerRegistryPrivateUri)
              repository: meshmakers/octo-mesh-asset-rep-services
              dockerfile: src/AssetRepositoryServices/Dockerfile
              platforms: 'linux/arm64,linux/amd64'
              enableMainLatestTag: true
          - template: templates/steps/handle-artifacts.yml@pipelineTemplates
